<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Edit Appliance</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow p-5">
            <h2 class="text-center mb-4">Edit Appliance</h2>

            <form method="POST">
              <!-- NAME -->
              <div class="mb-3">
                <label class="form-label"> Appliance Name </label>

                <input
                  type="text"
                  name="appliance_name"
                  class="form-control"
                  value="{{ appliance['appliance_name'] }}"
                  required
                />
              </div>

              <!-- POWER -->
              <div class="mb-3">
                <label class="form-label"> Power </label>

                <input
                  type="number"
                  name="power"
                  class="form-control"
                  value="{{ appliance['power'] }}"
                  required
                />
              </div>

              <!-- HOURS -->
              <div class="mb-4">
                <label class="form-label"> Hours Used </label>

                <input
                  type="number"
                  name="hours"
                  class="form-control"
                  value="{{ appliance['hours'] }}"
                  required
                />
              </div>

              <!-- BUTTON -->
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  Update Appliance
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
